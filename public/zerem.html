<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zerem</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand:#1B3A6B;--brand2:#2456A4;--bl:#EBF2FF;--bb:#A8C3E8;
  --text:#0e1c18;--text-2:#4a6058;--text-3:#8fada5;
  --bg:#F4F7FF;--surface:#ffffff;--border:#dde9e4;
  --error:#D85A30;--amber:#BA7517;--blue:#185FA5;--blue-light:#EEF6FF;--blue-border:#B8D8F8;
  --rail:#091529;--sidebar:#0D1B3E;
  --shadow:0 2px 10px rgba(0,0,0,0.06);
  font-family:'Plus Jakarta Sans',sans-serif;
}
body{background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:0;}
.app{display:flex;width:100vw;height:100vh;background:var(--surface);overflow:hidden;}

/* ── RAIL ── */
.rail{width:56px;background:var(--rail);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;flex-shrink:0;z-index:10;}
.rail-logo{width:32px;height:32px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;cursor:pointer;}
.rail-logo svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.rib{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s;position:relative;}
.rib:hover{background:rgba(255,255,255,0.08);}
.rib.active{background:var(--brand);}
.rib svg{width:17px;height:17px;fill:none;stroke:rgba(255,255,255,0.4);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.rib.active svg,.rib:hover svg{stroke:rgba(255,255,255,0.9);}
.rib-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#D85A30;border:2px solid var(--rail);}
.rsep{width:28px;height:0.5px;background:rgba(255,255,255,0.1);margin:4px 0;}
.rav{width:30px;height:30px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-top:auto;cursor:pointer;}

/* ── SIDEBAR ── */
.sidebar{width:230px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.04);}
.sb-head{padding:12px 10px 6px;}
.sb-org{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;cursor:pointer;margin-bottom:4px;}
.sb-org:hover{background:rgba(255,255,255,0.05);}
.org-av{width:26px;height:26px;border-radius:6px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;}
.org-name{font-size:13px;font-weight:600;color:rgba(255,255,255,0.9);flex:1;}
.sb-search{margin:0 7px 6px;padding:6px 10px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.1);border-radius:7px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:rgba(255,255,255,0.7);outline:none;width:calc(100% - 14px);}
.sb-search::placeholder{color:rgba(255,255,255,0.2);}
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:10px;}
.sb-scroll::-webkit-scrollbar{width:2px;}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.sb-sec{padding:8px 10px 3px;font-size:9px;font-weight:600;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.08em;display:flex;align-items:center;justify-content:space-between;}
.sb-sec-btn{border:none;background:transparent;color:rgba(255,255,255,0.2);cursor:pointer;font-size:15px;line-height:1;padding:0;}
.sb-sec-btn:hover{color:rgba(255,255,255,0.5);}
.sbi{display:flex;align-items:center;gap:7px;padding:5px 10px;cursor:pointer;transition:background 0.1s;border-radius:0;}
.sbi:hover{background:rgba(255,255,255,0.05);}
.sbi.active{background:rgba(255,255,255,0.1);}
.sbi-av{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;flex-shrink:0;}
.sbi-icon{width:19px;height:19px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.sbi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sbi-lbl{font-size:13px;color:rgba(255,255,255,0.45);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sbi.active .sbi-lbl,.sbi:hover .sbi-lbl{color:rgba(255,255,255,0.9);}
.sbi-badge{font-size:8px;padding:1px 5px;border-radius:10px;background:#D85A30;color:#fff;font-weight:700;flex-shrink:0;}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--brand2);flex-shrink:0;}
.dept-arrow{font-size:10px;color:rgba(255,255,255,0.2);transition:transform 0.2s;flex-shrink:0;}
.dept-arrow.open{transform:rotate(90deg);}
/* subdept items */
.subdept-row{display:flex;align-items:center;padding:4px 6px 4px 10px;cursor:pointer;gap:5px;transition:background .1s;user-select:none;}
.subdept-row:hover{background:rgba(255,255,255,0.05);}
.subdept-row.active{background:rgba(255,255,255,0.10);}
.subdept-row.dragging{opacity:0.35;background:rgba(255,255,255,0.04);}
.subdept-row.drag-over-above{border-top:2px solid var(--brand3);}
.subdept-row.drag-over-below{border-bottom:2px solid var(--brand3);}
.subdept-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.subdept-lbl{font-size:12px;color:rgba(255,255,255,0.38);flex:1;}
.subdept-row.active .subdept-lbl,.subdept-row:hover .subdept-lbl{color:rgba(255,255,255,0.82);}
.subdept-tt{font-size:7px;padding:1px 4px;border-radius:3px;font-weight:600;flex-shrink:0;}
.drag-grip{width:16px;height:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5px;flex-shrink:0;cursor:grab;opacity:0;transition:opacity .15s;padding:0 2px;}
.drag-grip:active{cursor:grabbing;}
.subdept-row:hover .drag-grip{opacity:1;}
.drag-grip span{display:block;width:10px;height:1.5px;background:rgba(255,255,255,0.35);border-radius:2px;}
.tt-1{background:rgba(29,158,117,0.25);color:#A8C3E8;}
.tt-2{background:rgba(83,74,183,0.25);color:#AFA9EC;}
.tt-3{background:rgba(186,117,23,0.25);color:#F5D08A;}
.subdept-unread{font-size:8px;padding:1px 4px;border-radius:8px;background:#D85A30;color:#fff;font-weight:700;flex-shrink:0;}
.add-row{display:flex;align-items:center;gap:7px;padding:4px 10px;cursor:pointer;opacity:0.4;}
.add-row:hover{opacity:0.7;}
.add-row span{font-size:12px;color:rgba(255,255,255,0.6);font-style:italic;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--surface);}
.topbar{height:50px;padding:0 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;}
.tb-left{display:flex;align-items:center;gap:9px;min-width:0;}
.tb-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.tb-av.square{border-radius:6px;}
.tb-av.hash{background:var(--bl);color:var(--brand);font-size:15px;font-weight:700;}
.tb-info{min-width:0;}
.tb-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sub{font-size:10px;color:var(--text-3);white-space:nowrap;}
.tb-right{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.tbb{display:flex;align-items:center;gap:4px;padding:5px 11px;border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--text-2);cursor:pointer;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
.tbb:hover{border-color:var(--brand);color:var(--brand);background:var(--bl);}
.tbb.prim{background:var(--brand);color:#fff;border-color:var(--brand);}
.tbb.prim:hover{background:#142D5C;}
.tbb svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── TABS ── */
.tabbar{display:flex;border-bottom:1px solid var(--border);padding:0 14px;flex-shrink:0;overflow-x:auto;}
.tabbar::-webkit-scrollbar{display:none;}
.tab{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
.tab:hover{color:var(--text-2);}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:500;}

/* ── CHAT ── */
.chat-area{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--bg);}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 16px 8px;display:flex;flex-direction:column;gap:1px;}
.chat-msgs::-webkit-scrollbar{width:4px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.date-sep{display:flex;align-items:center;gap:10px;margin:10px 0 8px;}
.date-line{flex:1;height:0.5px;background:var(--border);}
.date-lbl{font-size:10px;color:var(--text-3);font-weight:500;}
.sys-pill{align-self:center;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:10px;color:var(--text-3);margin:6px 0;}
/* message */
.msg-group{margin-bottom:2px;}
.msg-row{display:flex;align-items:flex-end;gap:9px;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;align-self:flex-start;margin-top:3px;}
.msg-col{display:flex;flex-direction:column;max-width:64%;}
.msg-row.mine .msg-col{align-items:flex-end;}
.msg-sender{font-size:10px;font-weight:600;color:var(--text-2);margin-bottom:3px;margin-left:2px;}
.bubble{padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.55;color:var(--text);background:var(--surface);border:1px solid var(--border);word-break:break-word;position:relative;}
.bubble.mine{background:var(--brand);color:#fff;border-color:var(--brand);}
.msg-time{font-size:10px;color:var(--text-3);margin-top:3px;margin-left:2px;}
.msg-row.mine .msg-time{text-align:right;margin-right:2px;margin-left:0;color:var(--text-3);}
/* attachment inside bubble */
.att-card{display:flex;align-items:center;gap:8px;padding:8px 11px;background:rgba(255,255,255,0.18);border-radius:10px;margin-top:6px;cursor:pointer;}
.att-card.light{background:var(--bg);border:1px solid var(--border);}
.att-icon{font-size:20px;flex-shrink:0;}
.att-info{flex:1;min-width:0;}
.att-name{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.att-sz{font-size:10px;opacity:0.65;}
/* reactions */
.rxn-row{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.rxn-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;transition:all 0.15s;}
.rxn-pill:hover,.rxn-pill.me{background:var(--bl);border-color:var(--bb);}
.rxn-pill span{font-size:10px;color:var(--text-2);}

/* composer */
.composer{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.comp-toolbar{display:flex;gap:2px;margin-bottom:6px;}
.ctool{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;font-size:15px;color:var(--text-3);transition:all 0.15s;}
.ctool:hover{background:var(--bg);color:var(--brand);}
.ctool svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.comp-row{display:flex;align-items:flex-end;gap:8px;}
.comp-input{flex:1;min-height:38px;max-height:120px;padding:9px 13px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:var(--bg);outline:none;resize:none;line-height:1.4;}
.comp-input:focus{border-color:var(--brand);background:#fff;}
.send-btn{width:36px;height:36px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;transition:all 0.15s;}
.send-btn:hover{background:#142D5C;transform:scale(1.05);}
.send-btn svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── NON-CHAT CONTENT ── */
.content{flex:1;overflow-y:auto;background:var(--bg);}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.month-nav{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.mnt{padding:4px 12px;font-size:13px;cursor:pointer;border-radius:6px;color:var(--text-2);}
.mnt.active{background:var(--brand);color:#fff;font-weight:500;}
.week-nav{display:flex;gap:4px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface);}
.wnt{padding:3px 10px;font-size:13px;cursor:pointer;border:1px solid var(--border);border-radius:6px;color:var(--text-2);}
.wnt.active{background:var(--bl);border-color:var(--brand);color:var(--brand);font-weight:500;}
.pw{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.fc{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.fch{padding:9px 12px;border-bottom:1px solid var(--border);background:#f9fbfa;display:flex;align-items:center;justify-content:space-between;}
.fch h4{font-size:13px;font-weight:600;color:var(--text);}
.fcb{padding:10px 12px;}
.fr{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;align-items:flex-end;}
.fd{display:flex;flex-direction:column;flex:1;min-width:90px;}
.fd.wide{flex:2;}
.fl{font-size:10px;font-weight:600;color:var(--text-3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.04em;}
.fi{width:100%;padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);outline:none;background:var(--surface);height:30px;}
.fi:focus{border-color:var(--brand);}
.mon-sec{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:8px;padding:9px 11px;margin-bottom:8px;}
.mon-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.mon-badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.mon-sel{padding:3px 8px;border:1px solid var(--blue-border);border-radius:5px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:#0C447C;outline:none;background:#fff;cursor:pointer;}
.mfl{font-size:10px;font-weight:600;color:var(--blue);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.04em;}
.mfi{width:100%;padding:5px 9px;border:1px solid var(--blue-border);border-radius:6px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);outline:none;background:#fff;height:30px;}
.csec{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.csec span{font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.04em;}
.add-c-btn{padding:4px 11px;background:var(--bl);color:var(--brand);border:1px solid var(--bb);border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.col-lbl-row{display:grid;grid-template-columns:1fr 100px 28px;gap:7px;padding:0 3px;margin-bottom:3px;}
.cl{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.04em;}
.cl.r{text-align:right;}
.cr{display:grid;grid-template-columns:1fr 100px 28px auto;gap:7px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 9px;margin-bottom:4px;}
.inp-cn{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);outline:none;background:var(--surface);height:30px;}
.inp-cn:focus{border-color:var(--brand);}
.inp-cq{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);outline:none;background:var(--surface);height:30px;text-align:right;}
.inp-cq:focus{border-color:var(--brand);}
.pcs-lbl{font-size:11px;color:var(--text-3);}
.rm-btn{padding:2px 7px;border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer;background:transparent;color:var(--error);font-family:'Plus Jakarta Sans',sans-serif;height:26px;}
.rm-btn:hover{background:var(--error);color:#fff;}
.rw{margin-bottom:4px;}
.mode-row{display:flex;align-items:center;gap:5px;padding:0 3px;margin-top:3px;}
.mode-tog{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.mt-b{padding:3px 10px;font-size:11px;cursor:pointer;color:var(--text-2);border:none;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;}
.mt-b.active{background:var(--brand);color:#fff;font-weight:500;}
.szrow{width:100%;border-collapse:collapse;margin-top:4px;}
.szrow th{padding:3px 4px;background:var(--surface);border:1px solid var(--border);font-weight:600;color:var(--text-3);text-align:center;font-size:10px;}
.szrow td{padding:2px;border:1px solid var(--border);text-align:center;}
.szrow input{width:100%;padding:3px;border:none;outline:none;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:transparent;text-align:center;}
.szrow input:focus{background:var(--bl);}
.sub-btn{width:100%;padding:8px;background:var(--brand);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:6px;}
.sub-btn:hover{background:#142D5C;}
.slc{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.slch{padding:8px 12px;border-bottom:1px solid var(--border);background:#f9fbfa;}
.slch h4{font-size:13px;font-weight:600;color:var(--text);}
.se{border-bottom:1px solid var(--border);padding:9px 12px;}
.se:last-child{border-bottom:none;}
.se-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.sc{font-weight:700;color:var(--brand);font-family:'JetBrains Mono',monospace;font-size:12px;}
.mtag{font-size:11px;color:var(--text-3);}
.se-body{display:flex;gap:12px;flex-wrap:wrap;}
.se-mon{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:7px;padding:7px 10px;min-width:185px;}
.se-mon-title{font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.se-mon-badge{background:var(--blue);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;}
.se-mon-row{display:flex;gap:9px;flex-wrap:wrap;}
.se-mon-item{display:flex;flex-direction:column;gap:1px;}
.se-mon-lbl{font-size:9px;color:#5B8FBF;text-transform:uppercase;}
.se-mon-val{font-size:12px;font-weight:600;color:#0C447C;}
/* T2 */
.wgh{background:#EEF4FF;}
.wgh td{padding:6px 10px;font-size:13px;font-weight:600;color:var(--brand);border-bottom:1px solid var(--border);}
.sbar{padding:7px 12px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;font-size:13px;}
.tblw{overflow-x:auto;padding:10px 12px;}
.bt{width:100%;border-collapse:collapse;border:1px solid var(--border);background:var(--surface);}
.bt th{padding:7px 9px;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;background:#f9fbfa;border:1px solid var(--border);text-align:left;white-space:nowrap;}
.bt th.mth{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border);}

<script>

// ── READ URL PARAMS (passed from Next.js auth) ──
const URL_PARAMS = new URLSearchParams(window.location.search);
const CURRENT_USER = {
  id: URL_PARAMS.get('user_id') || 'demo',
  org_id: URL_PARAMS.get('org_id') || 'demo',
  full_name: URL_PARAMS.get('full_name') || 'User',
  role: URL_PARAMS.get('role') || 'member',
  org_name: URL_PARAMS.get('org_name') || 'My Organisation',
  email: URL_PARAMS.get('email') || '',
  access_token: URL_PARAMS.get('access_token') || '',
  initials: (URL_PARAMS.get('full_name') || 'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2),
};

const SUPA_URL = 'https://fybsgyxegdvvgosfznxq.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YnNneXhlZ2R2dmdvc2Z6bnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTU4NDEsImV4cCI6MjA5MjU5MTg0MX0.KAxqJSIeqCO4hy_69uhmMO1LO6yNbk6RGd5h3GoEu9A';

async function supaFetch(table, options = {}) {
  const { select = '*', filters = [], insert = null, update = null } = options;
  let url = `${SUPA_URL}/rest/v1/${table}?select=${select}`;
  filters.forEach(f => { url += `&${f.key}=eq.${f.value}`; });
  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': `Bearer ${CURRENT_USER.access_token || SUPA_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': insert ? 'return=representation' : 'return=minimal',
  };
  const method = insert ? 'POST' : update ? 'PATCH' : 'GET';
  const body = insert ? JSON.stringify(insert) : update ? JSON.stringify(update) : undefined;
  const res = await fetch(url, { method, headers, body });
  return res.json();
}

function updateUserUI() {
  // Update user initials in rail avatar
  const rav = document.getElementById('user-rav');
  if (rav) rav.textContent = CURRENT_USER.initials;
  // Update org name in sidebar
  const orgNameEl = document.getElementById('org-name-el');
  if (orgNameEl) orgNameEl.textContent = CURRENT_USER.org_name;
  // Update org avatar initials
  const orgAv = document.getElementById('org-av-el');
  if (orgAv) orgAv.textContent = CURRENT_USER.org_name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  // Update org page avatar and name if visible
  const orgPageAv = document.getElementById('org-page-av');
  if (orgPageAv) orgPageAv.textContent = CURRENT_USER.org_name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const orgPageName = document.getElementById('org-page-name');
  if (orgPageName) orgPageName.textContent = CURRENT_USER.org_name;
}

async function loadDepartments() {
  if (!CURRENT_USER.org_id || CURRENT_USER.org_id === 'demo') { console.log('No org_id found:', CURRENT_USER); return; }
  try {
    const depts = await supaFetch('departments', {
      filters: [{ key: 'org_id', value: CURRENT_USER.org_id }]
    });
    const subs = await supaFetch('sub_departments', {
      filters: [{ key: 'org_id', value: CURRENT_USER.org_id }]
    });
    if (depts && depts.length > 0) {
      DEPTS.length = 0;
      depts.forEach(d => {
        DEPTS.push({
          id: d.id,
          name: d.name,
          icon: d.icon || d.name.slice(0,3).toUpperCase(),
          color: d.color || '#1B3A6B',
          colorBg: (d.color || '#1B3A6B') + '22',
          desc: d.description || '',
          head: '',
          members: [],
          subDepts: d.type === 'operations',
        });
      });
    }
    if (subs && subs.length > 0) {
      SUBS.length = 0;
      subs.sort((a,b) => (a.position||0) - (b.position||0));
      subs.forEach((s, i) => {
        SUBS.push({
          id: s.id,
          name: s.name,
          type: s.type,
          color: s.color || '#1B3A6B',
          label: s.label || s.name,
          recordLabel: s.record_label || 'pcs',
          locked: s.locked || false,
          unread: 0,
          position: s.position || i,
          statusKey: s.id + 'Status',
          dependsOn: null, // will be set after all subs loaded
        });
        // Set dependsOn based on position order
SUBS.forEach((sub, idx) => {
  if(idx > 0) sub.dependsOn = SUBS[idx-1].id;
});
      });
    }
    
updateUserUI();
renderSidebar();
loadStyles();
  } catch(e) {
    console.log('Using demo data', e);
  }
}

async function loadStyles(){
  if(!CURRENT_USER.org_id||CURRENT_USER.org_id==='demo')return;
  try {
    const result=await supaFetch('styles',{
      filters:[{key:'org_id',value:CURRENT_USER.org_id}]
    });
    if(result&&result.length>0){
      STYLES.length=0;
      result.forEach(s=>{
        STYLES.push({
          dbId:s.id,
          code:s.code,
          buyer:s.buyer,
          fabric:s.fabric||'',
          accessories:s.accessories||'',
          shipDate:s.ship_date||'',
          month:s.month||0,
          week:s.week||0,

async function loadProductionLogs(){
  if(!CURRENT_USER.org_id||CURRENT_USER.org_id==='demo')return;
  try {
    const logs=await supaFetch('production_logs',{
      filters:[{key:'org_id',value:CURRENT_USER.org_id}]
    });
    if(!logs||!logs.length)return;
    logs.forEach(log=>{
      const s=STYLES.find(x=>x.dbId===log.style_id);
      if(!s)return;
      const sd=SUBS.find(x=>x.id===log.sub_dept_id);
      if(!sd)return;
      const logKey=gLog(sd);
      if(!s[logKey])s[logKey]=[];
      const existing=s[logKey].find(e=>e.day===log.day);
      if(existing)existing.qty=log.qty;
      else s[logKey].push({day:log.day,qty:log.qty});
      // Update status
      const total=gTotal(s[logKey]);
      const oQ=tQty(s);
      if(total>=oQ)s[sd.statusKey]='completed';
      else if(total>0)s[sd.statusKey]='in-progress';
      s[gDone(sd)]=total;
    });
    console.log('Loaded production logs');
  } catch(e){ console.error('Load logs error',e); }
}

// ── HELPERS ──
function tQty(s){return s.colours.reduce((a,c)=>a+c.qty,0);}
function fmtD(d){return d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'-';}
function gLog(sd){return sd.id+'Log';}
function gDone(sd){return sd.id+'Done';}
function gTotal(log){return(log||[]).reduce((a,b)=>a+b.qty,0);}
function gDepDone(sd,s){
  if(!sd.dependsOn)return tQty(s);
  const dep=SUBS.find(x=>x.id===sd.dependsOn);if(!dep)return 0;
  if(dep.type===2)return s.prepDone||0;
  return gTotal(s[gLog(dep)]);
}
function getMonthDays(mi){
  const m=MONTH_META[mi],r=[];
  for(let d=1;d<=m.days;d++){const dow=new Date(m.year,m.month,d).getDay();r.push({day:d,dow,isSunday:dow===0,dayName:DAY_NAMES[dow]});}
  return r;
}
function nowTime(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}

function showToast(msg){
  const ex=document.querySelector('.toast');if(ex)ex.remove();
  clearTimeout(toastTimer);
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);toastTimer=setTimeout(()=>t.remove(),2400);
}

async function doCreateDept(){
  const name=document.getElementById('nd-name')?.value.trim();
  if(!name){showToast('Please enter a department name');return;}
  const desc=document.getElementById('nd-desc')?.value.trim()||'';
  const head=document.getElementById('nd-head')?.value.trim()||'';
  const abbr=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,3);
  const type=name.toLowerCase()==='operations'?'operations':'general';
  // Save to Supabase first to get real ID
  if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    try {
      const result=await supaFetch('departments',{insert:{
        org_id:CURRENT_USER.org_id,
        name,
        type,
        color:selColor,
        icon:abbr,
        description:desc,
      }});
      if(result&&result[0]){
        const d=result[0];
        DEPTS.push({id:d.id,name,icon:abbr,color:selColor,colorBg:selColor+'22',desc,head,headAv:'',members:[],subDepts:type==='operations'});
        if(!MSGS[d.id])MSGS[d.id]=[];
        closeModal();renderSidebar();renderOrgPage(document.getElementById('mc'));
        const tbSub=document.getElementById('tb-sub');
        if(tbSub)tbSub.textContent='Organisation overview \u00b7 '+DEPTS.length+' departments';
        showToast(name+' created');
        return;
      }
    } catch(e){ console.error('Create dept error',e); }
  }
  // Fallback for demo mode
  const id='dept_'+Date.now();
  DEPTS.push({id,name,icon:abbr,color:selColor,colorBg:selColor+'22',desc,head,headAv:'',members:[],subDepts:false});
  if(!MSGS[id])MSGS[id]=[];
  closeModal();renderSidebar();renderOrgPage(document.getElementById('mc'));
  const tbSub=document.getElementById('tb-sub');
  if(tbSub)tbSub.textContent='Organisation overview \u00b7 '+DEPTS.length+' departments';
  showToast(name+' created');
}

function openEditDept(id){
  const d=DEPTS.find(x=>x.id===id);if(!d)return;
  showModalHTML(`<h3 style="margin-bottom:4px;">Edit ${d.name}</h3>
    <label>Department name</label><input id="ed-name" value="${d.name}"/>
    <label>Description</label><textarea id="ed-desc" style="resize:none;height:60px;width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;margin-bottom:12px;">${d.desc}</textarea>
    <label>Department head</label><input id="ed-head" value="${d.head||''}"/>
    <div class="modal-btns">
      <button class="mbb" style="color:var(--error);border-color:var(--error);" onclick="doDeleteDept('${id}')">Delete</button>
      <button class="mbb" onclick="closeModal()">Cancel</button>
      <button class="mbb prim" onclick="doSaveDept('${id}')">Save changes</button>
    </div>`);
}

async function doSaveDept(id){
  const d=DEPTS.find(x=>x.id===id);if(!d)return;
  d.name=document.getElementById('ed-name')?.value.trim()||d.name;
  d.desc=document.getElementById('ed-desc')?.value.trim()||d.desc;
  d.head=document.getElementById('ed-head')?.value.trim()||d.head;
  const abbr=d.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,3);
  if(!['OPS','HR','ACC'].includes(d.icon))d.icon=abbr;
  // Save to Supabase
  if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    try {
      const url=`${SUPA_URL}/rest/v1/departments?id=eq.${id}`;
      await fetch(url,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({name:d.name,description:d.desc,icon:d.icon})});
    } catch(e){ console.error('Save dept error',e); }
  }
  closeModal();renderSidebar();renderOrgPage(document.getElementById('mc'));showToast(d.name+' updated');
}

async function doDeleteDept(id){
  const d=DEPTS.find(x=>x.id===id);if(!d)return;
  DEPTS.splice(DEPTS.findIndex(x=>x.id===id),1);
  closeModal();
  // Delete from Supabase
  if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    try {
      const url=`${SUPA_URL}/rest/v1/departments?id=eq.${id}`;
      await fetch(url,{method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`}});
    } catch(e){ console.error('Delete dept error',e); }
  }
  renderSidebar();
  renderOrgPage(document.getElementById('mc'));
  const tbSub=document.getElementById('tb-sub');
  if(tbSub)tbSub.textContent='Organisation overview \u00b7 '+DEPTS.length+' departments';
  showToast(d.name+' removed');
}
function openAddMemberDept(deptId){
  const d=DEPTS.find(x=>x.id===deptId);if(!d)return;
  const avail=Object.entries(ALL_PPL).filter(([k])=>k!=='SC'&&!d.members.includes(k));
  showModalHTML(`<h3 style="margin-bottom:10px;">Add member to ${d.name}</h3>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${avail.map(([av,p])=>`<div class="pp-item" onclick="doAddMemberDept('${deptId}','${av}')">
        <div style="width:30px;height:30px;border-radius:50%;background:${p.bg};color:${p.tc};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;">${av}</div>
        <div><div style="font-size:13px;font-weight:600;color:var(--text);">${p.name}</div><div style="font-size:11px;color:var(--text-3);">${p.role}</div></div>
        <span style="font-size:11px;color:var(--brand);font-weight:500;">Add +</span>
      </div>`).join('')}
      ${avail.length===0?'<p style="font-size:13px;color:var(--text-3);text-align:center;padding:12px;">All members are already in this department.</p>':''}
    </div>
    <div class="m-btns" style="margin-top:10px;"><button class="mb prim" onclick="closeModal()">Done</button></div>`);

function doAddMemberDept(deptId,av){
  const d=DEPTS.find(x=>x.id===deptId);if(!d||d.members.includes(av))return;
  d.members.push(av);
  const p=ALL_PPL[av];
  showToast((p?p.name:av)+' added to '+d.name);
  closeModal();renderOrgPage(document.getElementById('mc'));
}

function renderInbox(mc){
  mc.style.overflowY='auto';

  // Build a unified list of all channels with their last message + unread count
  const channels=[];

  // Sub-departments
  SUBS.forEach(sd=>{
    const msgs=(MSGS[sd.id]||[]).filter(m=>!m.sys);
    const last=msgs[msgs.length-1]||null;
    channels.push({
      type:'subdept',id:sd.id,
      name:sd.name,
      subtitle:`Type ${sd.type} · Operations`,
      icon:null,dotColor:sd.color,
      unread:sd.unread||0,
      lastMsg:last,
      lastTime:last?.time||null,
      onClick:`openSub('${sd.id}')`,
    });
  });

  // Departments (HR, Accounts + dynamic)
  DEPTS.forEach(d=>{
    const msgs=(MSGS[d.id]||[]).filter(m=>!m.sys);
    const last=msgs[msgs.length-1]||null;
    channels.push({
      type:'dept',id:d.id,
      name:d.name,
      subtitle:'Department channel',
      icon:d.icon,dotColor:d.color,
      unread:0,
      lastMsg:last,
      lastTime:last?.time||null,
      onClick:`openDept('${d.id}')`,
    });
  });

  // Groups
  GROUPS.forEach(g=>{
    const msgs=(MSGS[g.id]||[]).filter(m=>!m.sys);
    const last=msgs[msgs.length-1]||null;
    channels.push({
      type:'group',id:g.id,
      name:g.name,
      subtitle:`${g.members.length} members`,
      emoji:g.emoji,bgColor:g.color,tcColor:g.tc,
      unread:g.unread||0,
      lastMsg:last,
      lastTime:last?.time||null,
      onClick:`openGroup('${g.id}')`,
    });
  });

  // DMs
  DMS.forEach(dm=>{
    const msgs=(MSGS[dm.id]||[]).filter(m=>!m.sys);
    const last=msgs[msgs.length-1]||null;
    channels.push({
      type:'dm',id:dm.id,
      name:dm.name,
      subtitle:dm.role,
      av:dm.av,bg:dm.bg,tc:dm.tc,online:dm.online,
      unread:dm.unread||0,
      lastMsg:last,
      lastTime:last?.time||null,
      onClick:`openDM('${dm.id}')`,
    });
  });

  // Sort: unread first, then by most recent (those with messages first)
  channels.sort((a,b)=>{
    if(b.unread!==a.unread)return b.unread-a.unread;
    // channels with messages above empty ones
    if(!!b.lastMsg!==!!a.lastMsg)return b.lastMsg?1:-1;
    return 0;
  });

  const totalUnread=channels.reduce((s,c)=>s+c.unread,0);

  function buildAvatar(ch){
    if(ch.type==='group'){
      return`<div style="width:42px;height:42px;border-radius:10px;background:${ch.bgColor||'#EBF2FF'};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${ch.emoji}</div>`;
    }
    if(ch.type==='dm'){
      return`<div style="position:relative;flex-shrink:0;">
        <div style="width:42px;height:42px;border-radius:50%;background:${ch.bg};color:${ch.tc};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">${ch.av}</div>
        ${ch.online?`<span style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#3B7DD8;border:2px solid var(--bg);"></span>`:''}
      </div>`;
    }
    if(ch.type==='dept'){
      return`<div style="width:42px;height:42px;border-radius:10px;background:${ch.dotColor}22;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:${ch.dotColor};flex-shrink:0;letter-spacing:-.3px;">${ch.icon}</div>`;
    }
    // subdept
    return`<div style="width:42px;height:42px;border-radius:10px;background:${ch.dotColor}22;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span style="width:10px;height:10px;border-radius:50%;background:${ch.dotColor};display:block;"></span>
    </div>`;
  }

  function buildPreview(ch){
    if(!ch.lastMsg)return`<span style="color:var(--text-3);font-style:italic;">No messages yet</span>`;
    const who=ch.lastMsg.mine?'You':ch.lastMsg.name?.split(' ')[0]||'';
    const txt=ch.lastMsg.att?`${ch.lastMsg.text} 📎`:ch.lastMsg.text||'';
    const preview=(who?who+': ':'')+txt;
    return`<span style="color:${ch.unread>0?'var(--text-2)':'var(--text-3)'};font-weight:${ch.unread>0?'500':'400'};">${preview.length>55?preview.slice(0,55)+'…':preview}</span>`;
  }

  const sections=[
    {label:'Unread',items:channels.filter(c=>c.unread>0)},
    {label:'All channels',items:channels.filter(c=>c.unread===0)},
  ].filter(s=>s.items.length>0);

  mc.innerHTML=`<div style="width:100%;display:flex;flex-direction:column;box-sizing:border-box;">

    <!-- Header bar -->
    <div style="padding:14px 18px 10px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:14px;font-weight:700;color:var(--text);">All messages</span>
        ${totalUnread>0?`<span style="font-size:11px;padding:2px 9px;background:#C94B2C;color:#fff;border-radius:20px;font-weight:700;">${totalUnread} unread</span>`:'<span style="font-size:11px;color:var(--text-3);">All caught up</span>'}
      </div>
      <div style="display:flex;gap:6px;">
        <input id="inbox-search" placeholder="🔍 Filter channels…" oninput="filterInbox(this.value)" style="padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;background:var(--bg);width:200px;" onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border)'"/>
      </div>
    </div>

    <!-- Channel list -->
    <div id="inbox-list" style="flex:1;display:flex;flex-direction:column;">
      ${sections.map(sec=>`
        <div style="padding:10px 18px 4px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;">${sec.label}</div>
        ${sec.items.map(ch=>`
          <div onclick="${ch.onClick}" data-name="${ch.name.toLowerCase()}" style="display:flex;align-items:center;gap:13px;padding:11px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;" onmouseenter="this.style.background='var(--bl)'" onmouseleave="this.style.background=''">
            ${buildAvatar(ch)}
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px;">
                <span style="font-size:13px;font-weight:${ch.unread>0?'700':'500'};color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ch.name}</span>
                <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
                  ${ch.lastTime?`<span style="font-size:11px;color:var(--text-3);">${ch.lastTime}</span>`:''}
                  ${ch.unread>0?`<span style="font-size:10px;padding:2px 7px;background:#C94B2C;color:#fff;border-radius:20px;font-weight:700;min-width:20px;text-align:center;">${ch.unread}</span>`:''}
                </div>
              </div>
              <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${buildPreview(ch)}</div>
              <div style="font-size:11px;color:var(--text-3);margin-top:2px;">${ch.subtitle}</div>
            </div>
          </div>`).join('')}
      `).join('')}
    </div>
  </div>`;
}

function filterInbox(v){
  const lv=v.toLowerCase().trim();
  document.querySelectorAll('#inbox-list [data-name]').forEach(row=>{
    row.style.display=(!lv||row.dataset.name.includes(lv))?'':'none';
  });
  // hide section headers if all their items are hidden — simple approach: always show them
}

  // Load join requests if admin
  if(CURRENT_USER.role==='admin'){
    setTimeout(loadJoinRequests, 100);
    setTimeout(loadOrgCode, 100);
  }
}
async function loadOrgCode(){
  try {
    const orgs = await supaFetch('organisations', {
      select: 'org_code',
      filters: [{key: 'id', value: CURRENT_USER.org_id}]
    });
    if(orgs && orgs[0]){
      const el = document.getElementById('org-code-display');
      if(el) el.textContent = orgs[0].org_code || 'N/A';
    }
  } catch(e){ console.error(e); }
}

function copyOrgCode(){
  const code = document.getElementById('org-code-display')?.textContent;
  if(!code || code === 'Loading...') return;
  navigator.clipboard.writeText(code).then(() => showToast('Organisation code copied!'));
}
async function loadJoinRequests(){
  try {
    const requests=await supaFetch('join_requests',{
      filters:[
        {key:'org_id',value:CURRENT_USER.org_id},
        {key:'status',value:'pending'}
      ]
    });
    const section=document.getElementById('join-requests-section');
    const list=document.getElementById('join-requests-list');
    if(!section||!list)return;
    if(requests&&requests.length>0){
      section.style.display='block';
      list.innerHTML=requests.map(r=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg);border-radius:9px;border:1px solid var(--border);">
          <div style="width:38px;height:38px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;">
            ${(r.full_name||r.email||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:600;color:var(--text);">${r.full_name||'Unknown'}</div>
            <div style="font-size:11px;color:var(--text-3);">${r.email}</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button onclick="approveJoinRequest('${r.id}','${r.user_id}','${r.org_id}')" style="padding:6px 14px;background:var(--brand);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">Approve</button>
            <button onclick="rejectJoinRequest('${r.id}')" style="padding:6px 14px;background:transparent;color:var(--error);border:1px solid var(--error);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">Reject</button>
          </div>
        </div>`).join('');
    } else {
      section.style.display='none';
    }
  } catch(e){ console.error(e); }
}

async function approveJoinRequest(reqId, userId, orgId){
  try {
    // Update join request status
    const url=`${SUPA_URL}/rest/v1/join_requests?id=eq.${reqId}`;
    await fetch(url,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'approved'})});
    // Update profile setup_complete
    const url2=`${SUPA_URL}/rest/v1/profiles?id=eq.${userId}`;
    await fetch(url2,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({setup_complete:true})});
    showToast('Member approved — they can now access Zerem');
    loadJoinRequests();
  } catch(e){ showToast('Error approving request'); }
}

async function rejectJoinRequest(reqId){
  try {
    const url=`${SUPA_URL}/rest/v1/join_requests?id=eq.${reqId}`;
    await fetch(url,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'rejected'})});
    showToast('Request rejected');
    loadJoinRequests();
  } catch(e){ showToast('Error rejecting request'); }
}

function handleUserPicUpload(inp){
  const file=inp.files[0];if(!file)return;
  if(file.size>5*1024*1024){showToast('File too large — max 5MB');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    ORG_STATE.userAvatar=e.target.result;
    // Update all user avatars across the app
    refreshUserAvatars();
    renderProfilePage(document.getElementById('mc'));
    showToast('Profile photo updated');
  };
  reader.readAsDataURL(file);
}

function handleOrgPicUpload(inp){

let dragSrcId=null;

function renderSubsList(){
  const list=document.getElementById('subs-list');if(!list)return;list.innerHTML='';
  SUBS.forEach(sd=>{
    const isActive=currentView?.type==='subdept'&&currentView.id===sd.id;
    const div=document.createElement('div');
    div.className='subdept-row'+(isActive?' active':'');
    div.draggable=true;
    div.dataset.id=sd.id;
    div.innerHTML=`
      <div class="drag-grip" title="Drag to reorder"><span></span><span></span><span></span></div>
      <div class="subdept-dot" style="background:${sd.color};"></div>
      <span class="subdept-lbl">${sd.name}</span>
      <span class="subdept-tt tt-${sd.type}">T${sd.type}</span>
      ${sd.locked?`<span style="font-size:9px;opacity:.4;" title="Delete protected">🔒</span>`:''}
      ${sd.unread>0?`<span class="subdept-unread">${sd.unread}</span>`:''}`;

    // click-to-open — only if not dragging
    div.addEventListener('click',()=>{ if(!dragSrcId) openSub(sd.id); });

    // drag events
    div.addEventListener('dragstart',e=>{
      dragSrcId=sd.id;
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',sd.id);
    });
    div.addEventListener('dragend',()=>{
      dragSrcId=null;
      div.classList.remove('dragging');
      document.querySelectorAll('.subdept-row').forEach(r=>r.classList.remove('drag-over-above','drag-over-below'));
    });
    div.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      if(dragSrcId===sd.id)return;
      document.querySelectorAll('.subdept-row').forEach(r=>r.classList.remove('drag-over-above','drag-over-below'));
      const rect=div.getBoundingClientRect();
      const mid=rect.top+rect.height/2;
      div.classList.add(e.clientY<mid?'drag-over-above':'drag-over-below');
    });
    div.addEventListener('dragleave',()=>{
      div.classList.remove('drag-over-above','drag-over-below');
    });
    div.addEventListener('drop',e=>{
      e.preventDefault();
      div.classList.remove('drag-over-above','drag-over-below');
      if(!dragSrcId||dragSrcId===sd.id)return;
      const fromIdx=SUBS.findIndex(s=>s.id===dragSrcId);
      const toIdx=SUBS.findIndex(s=>s.id===sd.id);
      if(fromIdx===-1||toIdx===-1)return;
      const rect=div.getBoundingClientRect();
      const insertAfter=e.clientY>rect.top+rect.height/2;
      const [moved]=SUBS.splice(fromIdx,1);
      const newTo=SUBS.findIndex(s=>s.id===sd.id);
      SUBS.splice(insertAfter?newTo+1:newTo,0,moved);
      dragSrcId=null;
      renderSubsList();
      // if org page is open, re-render it too
      if(currentView?.type==='org')renderOrgPage(document.getElementById('mc'));
      // Rebuild dependsOn chain based on new order
      SUBS.forEach((sub, idx) => {
        sub.position = idx;
        sub.dependsOn = idx > 0 ? SUBS[idx-1].id : null;
      });
      // Save new positions to Supabase
      if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
        SUBS.forEach(async (sub, idx) => {
          try {
            const url=`${SUPA_URL}/rest/v1/sub_departments?id=eq.${sub.id}`;
            await fetch(url,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({position:idx})});
          } catch(e){ console.error('Position save error',e); }
        });
      }
      if(currentView?.type==='subdept')renderContent();
      showToast(moved.name+' reordered');
    });

    list.appendChild(div);
  });
}

      <div><div style="font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;">Total output — ${MONTHS[reportMonth]}</div>
      <div style="font-size:24px;font-weight:700;color:var(--text);">${grand.toLocaleString()} <span style="font-size:12px;font-weight:400;color:var(--text-3);">pcs across all depts</span></div></div>

    </div>
    ${T3subs.map(sd=>{
      const lk=gLog(sd);const dT=mS.reduce((a,s)=>a+gTotal(s[lk]),0);
      const dSet=new Set();mS.forEach(s=>(s[lk]||[]).forEach(e=>dSet.add(e.day)));
      return`<div class="rds"><div class="rdh">
        <span style="width:8px;height:8px;border-radius:50%;background:${sd.color};display:inline-block;flex-shrink:0;"></span>
        <span class="rdh-title">${sd.name}</span>

        const mon=s.monitor;const isM=mon&&mon.subId===sd.id;

function getTabs(sd){
  const tabs=[{id:'messages',label:'💬 Messages'}];
  if(sd.type===1)tabs.push({id:'input',label:'Add style'});
  else if(sd.type===2)tabs.push({id:'input',label:'Work'});
  else tabs.push({id:'input',label:'Daily input'});
  tabs.push({id:'styles',label:'All styles'});
  if(sd.type===3)tabs.push({id:'log',label:'📋 Daily log'});
  tabs.push({id:'members',label:'Members'});
  return tabs;
}
function renderTabbar(){
  if(currentView?.type!=='subdept'){document.getElementById('tabbar').classList.add('hidden');return;}

  const tb=document.getElementById('tabbar');tb.classList.remove('hidden');

function renderContent(){
  const mc=document.getElementById('mc');
  if(currentView?.type!=='subdept'){return;}
  const sd=SUBS.find(s=>s.id===currentView.id);if(!sd)return;
  mc.style.overflowY='hidden';

  else if(activeTab==='log')renderDailyLog(mc,sd);

}

async function renderMessages(mc,msgKey,channelName){
  mc.style.overflowY='hidden';
  mc.style.background='var(--surface)';
  if(!MSGS[msgKey])MSGS[msgKey]=[];

  // Build the chat UI first
  mc.innerHTML=`<div class="chat-area">
    <div class="chat-msgs" id="msgs-area">
      <div class="date-sep"><div class="date-line"></div><span class="date-lbl">Today · ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span><div class="date-line"></div></div>
      <div id="msgs-loading" style="text-align:center;padding:20px;color:var(--text-3);font-size:13px;">Loading messages...</div>
    </div>
    <div class="composer">
      <div class="comp-toolbar">
        <button class="ctool" onclick="showToast('Attach file')"><svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
        <button class="ctool" onclick="showToast('Attach image')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
        <button class="ctool" onclick="showToast('Tag style')">📋</button>
        <button class="ctool" onclick="showToast('Send report')"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></button>
        <button class="ctool" onclick="showToast('Emoji')">😊</button>
      </div>
      <div class="comp-row">
        <textarea class="comp-input" id="ci" placeholder="Message ${channelName}..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsgSub('${msgKey}');}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="send-btn" onclick="sendMsgSub('${msgKey}')"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
  </div>`;

  // Load messages from Supabase
  if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    try {
      const msgs=await supaFetch('messages',{
        select:'*&order=created_at.asc',
        filters:[
          {key:'org_id',value:CURRENT_USER.org_id},
          {key:'channel_id',value:msgKey}
        ]
      });
      const area=document.getElementById('msgs-area');
      const loading=document.getElementById('msgs-loading');
      if(loading)loading.remove();
      if(area&&msgs&&msgs.length>0){
        msgs.forEach(msg=>{
          const isMe=msg.user_id===CURRENT_USER.id;
          const m={
            av:isMe?CURRENT_USER.initials:(msg.sender_initials||'?'),
            bg:isMe?'#2456A4':'#6B7280',
            tc:'#fff',
            name:isMe?CURRENT_USER.full_name:(msg.sender_name||'Team member'),
            text:msg.content,
            time:new Date(msg.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
            mine:isMe
          };
          MSGS[msgKey].push(m);
          const div=document.createElement('div');
          div.innerHTML=buildMsg(m, msg.id);
          area.appendChild(div.firstElementChild||div);
        });
        area.scrollTop=area.scrollHeight;
      } else {
        if(loading)loading.remove();
      }
    } catch(e){
      console.error('Load messages error',e);
      const loading=document.getElementById('msgs-loading');
      if(loading)loading.textContent='';
    }
  } else {
    // Demo mode - show existing messages
    const area=document.getElementById('msgs-area');
    const loading=document.getElementById('msgs-loading');
    if(loading)loading.remove();
    if(area){
      MSGS[msgKey].forEach(m=>{
        const div=document.createElement('div');
        div.innerHTML=buildMsg(m);
        area.appendChild(div.firstElementChild||div);
      });
      area.scrollTop=area.scrollHeight;
    }
  }
}

function buildMsg(m,msgId){
  if(m.sys)return`<div class="sys-pill">${m.sys}</div>`;
  const att=m.att?`<div class="att-card${m.mine?'':' light'}"><span class="att-icon">${m.att.icon||m.att.ico||'📎'}</span><div class="att-info"><div class="att-name">${m.att.name}</div><div class="att-sz">${m.att.size}</div></div></div>`:'';
  const rxn=m.rxn?`<div class="rxn-row">${m.rxn.map(r=>`<div class="rxn-pill">${r.e}<span>${r.n}</span></div>`).join('')}</div>`:'';
  const deleteBtn=m.mine&&msgId?`<button onclick="deleteMsg('${msgId}')" style="opacity:0;transition:opacity .15s;border:none;background:none;cursor:pointer;color:var(--error);font-size:11px;padding:2px 6px;border-radius:4px;margin-left:4px;" class="msg-del-btn" title="Delete message">✕</button>`:'';
  return`<div class="msg-group" ${msgId?`data-msg-id="${msgId}"`:''}
    onmouseenter="this.querySelector('.msg-del-btn')&&(this.querySelector('.msg-del-btn').style.opacity='1')"
    onmouseleave="this.querySelector('.msg-del-btn')&&(this.querySelector('.msg-del-btn').style.opacity='0')">
    <div class="msg-row${m.mine?' mine':''}">
      ${!m.mine?`<div class="msg-av" style="background:${m.bg};color:${m.tc};">${m.av}</div>`:''}
      <div class="msg-col">
        ${!m.mine?`<div class="msg-sender">${m.name}</div>`:''}
        <div class="bubble${m.mine?' mine':''}">${m.text}${att}</div>
        ${rxn}
        <div class="msg-time" style="display:flex;align-items:center;">${m.mine?'You · ':''}${m.time}${m.mine?' ✓✓':''}${deleteBtn}</div>
      </div>
      ${m.mine?`<div class="msg-av" style="background:#2456A4;color:#fff;">${m.av||CURRENT_USER.initials}</div>`:''}
    </div>
  </div>`;
}
async function deleteMsg(msgId){
  if(!confirm('Delete this message?'))return;
  try {
    // Delete from DOM
    const el=document.querySelector(`[data-msg-id="${msgId}"]`);
    if(el)el.remove();
    // Delete from Supabase
    if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
      const url=`${SUPA_URL}/rest/v1/messages?id=eq.${msgId}&user_id=eq.${CURRENT_USER.id}`;
      await fetch(url,{
        method:'DELETE',
        headers:{
          'apikey':SUPA_KEY,
          'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,
        }
      });
    }
    showToast('Message deleted');
  } catch(e){
    console.error(e);
    showToast('Error deleting message');
  }
}
async function sendMsg(key){
  const ci=document.getElementById('ci');if(!ci)return;
  const text=ci.value.trim();if(!text)return;
  const area=document.getElementById('msgs-area');if(!area)return;
  const m={
    av:CURRENT_USER.initials,
    bg:'#2456A4',tc:'#fff',
    name:CURRENT_USER.full_name,
    text,time:nowTime(),mine:true
  };
  if(!MSGS[key])MSGS[key]=[];
  MSGS[key].push(m);
  const div=document.createElement('div');
  const pendingId='pending-msg-'+Date.now();
  div.innerHTML=buildMsg(m, null);
  const appendedEl = div.firstElementChild||div;
  appendedEl.id=pendingId;
  area.appendChild(appendedEl);
  ci.value='';ci.style.height='';area.scrollTop=area.scrollHeight;
  // Save to Supabase
  if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    try {
      const result=await supaFetch('messages',{
        insert:{
          org_id:CURRENT_USER.org_id,
          channel_id:key,
          user_id:CURRENT_USER.id,
          content:text,
          sender_name:CURRENT_USER.full_name,
          sender_initials:CURRENT_USER.initials,
        }
      });
      if(result&&result[0]){
        const pendingEl=document.getElementById(pendingId);
        if(pendingEl){
          pendingEl.outerHTML=buildMsg(m,result[0].id);
        }
      }
    } catch(e){ console.error('Message save error',e); }
  }
}

function addMemberToGroup(gId,av,row){

function submitStyle(){
  const code=document.getElementById('f-code')?.value.trim();
  const buyer=document.getElementById('f-buyer')?.value.trim();
  if(!code||!buyer){showToast('Style code and buyer required');return;}

  // Get date values
  const fabricRaw=document.getElementById('f-fabric')?.value;
  const accRaw=document.getElementById('f-acc')?.value;
  const shipRaw=document.getElementById('f-ship')?.value;
  const monStartRaw=document.getElementById('mon-start')?.value;
  const monFinRaw=document.getElementById('mon-finish')?.value;

  const toD=r=>r?new Date(r):null;
  const dFab=toD(fabricRaw);
  const dAcc=toD(accRaw);
  const dShip=toD(shipRaw);
  const dMonStart=toD(monStartRaw);
  const dMonFin=toD(monFinRaw);

  // ── Date validation ──
  const errors=[];

  

  if(dAcc&&dShip&&dAcc>=dShip)
    errors.push('Accessories date must be strictly before ship date.');

  if(dFab&&dShip&&dFab>dShip)
    errors.push('Fabric arrival must be before ship date.');

  if(dMonStart&&dFab&&dMonStart<=dFab)
    errors.push('Monitor start must be after fabric arrival date.');

  
  if(dMonFin&&dShip&&dMonFin>=dShip)
    errors.push('Monitor finish must be strictly before ship date.');

  if(dMonStart&&dMonFin&&dMonStart>dMonFin)
    errors.push('Monitor start must be before monitor finish date.');

  if(errors.length){
    showToast(errors[0]);
    return;
  }

  // Clear errors
  const errEl=document.getElementById('style-form-errors');
  if(errEl)errEl.remove();

  const monSubId=document.getElementById('mon-sub')?.value||'sewing';
  const rows=document.querySelectorAll('.cr');const colours=[];
  rows.forEach(row=>{const idx=parseInt(row.dataset.idx);const name=document.getElementById('cn-'+idx)?.value.trim()||'Colour '+(idx+1);const qty=parseInt(document.getElementById('cq-'+idx)?.value)||0;const mode=colourRowModes[idx]||'simple';const sI=row.closest('.rw')?.querySelectorAll('.szrow input');const sizes=mode==='detailed'?Array.from(sI||[]).map((inp,i)=>({s:SIZES[i],q:parseInt(inp.value)||0})).filter(s=>s.q>0):[];colours.push({name,qty,mode,sizes});});

  const newStyle={code,buyer,
    fabric:fmtD(fabricRaw),
    accessories:fmtD(accRaw),
    shipDate:fmtD(shipRaw),
    month:activeMonth,week:activeWeek,colours,
    monitor:{subId:monSubId,startDate:fmtD(monStartRaw),finishDate:fmtD(monFinRaw),dailyTarget:parseInt(document.getElementById('mon-target')?.value)||0},
    prepStatus:'not-started',prepDone:0,
    sewingStatus:'not-started',sewingLog:[],
    qcStatus:'not-started',qcLog:[],
    packingStatus:'not-started',packingLog:[]
  };

  STYLES.push(newStyle);

  if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    supaFetch('styles',{insert:{
      org_id:CURRENT_USER.org_id,
      code,buyer,
      fabric:newStyle.fabric,
      accessories:newStyle.accessories,
      ship_date:newStyle.shipDate,
      month:activeMonth,
      week:activeWeek,
      colours:JSON.stringify(colours),
      monitor:JSON.stringify(newStyle.monitor),
      prep_status:'not-started',
      prep_done:0,
    }}).then(result=>{
      if(result&&result[0])newStyle.dbId=result[0].id;
    }).catch(e=>console.error('Style save error',e));
  }

  showToast(`${code} added`);renderT1(document.getElementById('mc'));
}

  const workDays=mDays.filter(d=>!d.isSunday).length;
  let html=`<div class="content"><div class="month-nav">${MONTHS.map((m,i)=>`<div class="mnt${i===activeMonth?' active':''}" onclick="setMonthLog(${i})">${m}</div>`).join('')}</div>

async function saveStyle(si){
  const s=STYLES[si];if(!s)return;

  // ── Collect values ──
  const code=document.getElementById('es-code')?.value.trim();
  const buyer=document.getElementById('es-buyer')?.value.trim();
  if(!code||!buyer){showValidationError('Style code and buyer are required.');return;}

  const fabricRaw=document.getElementById('es-fabric')?.value;
  const accRaw=document.getElementById('es-acc')?.value;
  const shipRaw=document.getElementById('es-ship')?.value;
  const monStartRaw=document.getElementById('es-mon-start')?.value;
  const monFinRaw=document.getElementById('es-mon-fin')?.value;

  // Parse to Date objects for comparison (keep nulls for unset)
  const toDate=raw=>raw?new Date(raw):null;
  const dFab=toDate(fabricRaw);
  const dAcc=toDate(accRaw);
  const dShip=toDate(shipRaw);
  const dMonStart=toDate(monStartRaw);
  const dMonFin=toDate(monFinRaw);

// ── Date ordering validation ──
  const errors=[];

  if(dFab&&dShip&&dFab>=dShip)
    errors.push('Fabric arrival must be strictly before ship date.');

  if(dAcc&&dShip&&dAcc>=dShip)
    errors.push('Accessories date must be strictly before ship date.');

  if(dMonStart&&dFab&&dMonStart<=dFab)
    errors.push('Monitor start must be strictly after fabric arrival.');

  if(dMonFin&&dShip&&dMonFin>=dShip)
    errors.push('Monitor finish must be strictly before ship date.');

  if(dMonStart&&dMonFin&&dMonStart>dMonFin)
    errors.push('Monitor start must be before or equal to monitor finish.');

  if(errors.length){showValidationError(errors.join('\n'));return;}

  // ── Collect new colour quantities ──
  const newColours=[...s.colours];
  const colContainers=document.querySelectorAll('#es-colours > div');
  colContainers.forEach((row,i)=>{
    if(!newColours[i])return;
    const nameInp=document.getElementById(`ec-name-${i}`);
    const qtyInp=document.getElementById(`ec-qty-${i}`);
    if(nameInp)newColours[i]={...newColours[i],name:nameInp.value.trim()||newColours[i].name};
    if(qtyInp)newColours[i]={...newColours[i],qty:parseInt(qtyInp.value)||newColours[i].qty};
  });
  const oldTotal=tQty(s);
  const newTotal=newColours.reduce((a,c)=>a+c.qty,0);
  const qtyChanged=oldTotal!==newTotal;

  // ── Apply all changes ──
  s.code=code;
  s.buyer=buyer;
  if(fabricRaw)s.fabric=fmtD(fabricRaw);
  if(accRaw)s.accessories=fmtD(accRaw);
  if(shipRaw)s.shipDate=fmtD(shipRaw);
  const wkVal=parseInt(document.getElementById('es-week')?.value);
  if(!isNaN(wkVal)){s.week=wkVal;s.wk=wkVal;}

  // Monitor
  if(!s.monitor)s.monitor={};
  s.monitor.subId=document.getElementById('es-mon-sub')?.value||s.monitor.subId;
  if(monStartRaw)s.monitor.startDate=fmtD(monStartRaw);
  if(monFinRaw)s.monitor.finishDate=fmtD(monFinRaw);
  s.monitor.dailyTarget=parseInt(document.getElementById('es-mon-tgt')?.value)||s.monitor.dailyTarget||0;

  // Apply colours
  s.colours=newColours;

  // ── Recalculate downstream when qty changes ──
  if(qtyChanged){
    const newQty=tQty(s);
    // Preparation: if completed, prepDone = new total
    if(s.prepStatus==='completed')s.prepDone=newQty;

    // For each T3 sub-dept: recalculate status based on new total qty
    SUBS.filter(sd=>sd.type===3&&sd.statusKey).forEach(sd=>{
      const logKey=gLog(sd);
      const produced=gTotal(s[logKey]);
      if(produced===0)s[sd.statusKey]='not-started';
      else if(produced>=newQty)s[sd.statusKey]='completed';
      else s[sd.statusKey]='in-progress';
    });
  }

  // ── If shipment date changed, recalculate daily target suggestion ──
  // (keep target as-is — user controls it — but warn if monitor finish now exceeds ship date)
  const notes=[];
  if(shipRaw&&dShip&&dMonFin&&dMonFin>dShip){
    // Already caught above — won't reach here
  }
  if(qtyChanged){
    notes.push(`Qty changed ${oldTotal.toLocaleString()} → ${newTotal.toLocaleString()} pcs. Production statuses recalculated.`);
  }

  // Save to Supabase
  if(s.dbId&&CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    try {
      const url=`${SUPA_URL}/rest/v1/styles?id=eq.${s.dbId}`;
      await fetch(url,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({
        code:s.code,
        buyer:s.buyer,
        fabric:s.fabric,
        accessories:s.accessories,
        ship_date:s.shipDate,
        week:s.week||s.wk||0,
        colours:JSON.stringify(s.colours),
        monitor:JSON.stringify(s.monitor),
        prep_done:s.prepDone,
      })});
    } catch(e){ console.error('Edit style save error',e); }
  }

  closeModal();

  // Re-render current view
  const mc=document.getElementById('mc');
  const sd=SUBS.find(x=>x.id===currentView?.id);
  if(activeTab==='styles'&&sd)renderAllStyles(mc,sd);
  else if(activeTab==='input'&&sd?.type===1)renderT1(mc);
  else if(sd)renderContent();

  showToast(notes.length?`${s.code} saved — ${notes[0]}`:`${s.code} updated`);
}

function showValidationError(msg){
  // Show error inline in modal without closing it
  let errEl=document.getElementById('modal-validation-err');
  if(!errEl){
    errEl=document.createElement('div');
    errEl.id='modal-validation-err';
    errEl.style.cssText='margin-bottom:12px;padding:10px 13px;background:#FEF0EB;border:1.5px solid var(--error);border-radius:8px;font-size:12px;color:var(--error);line-height:1.6;white-space:pre-line;';
    // Insert before the modal-btns
    const btns=document.querySelector('#modal-body .modal-btns');
    if(btns)btns.parentNode.insertBefore(errEl,btns);
    else document.getElementById('modal-body')?.appendChild(errEl);
  }
  errEl.textContent=msg;
  errEl.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function deleteStyleConfirm(si){
  const s=STYLES[si];if(!s)return;
  showModalHTML(`<h3 style="margin-bottom:8px;">Delete ${s.code}?</h3>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:6px;line-height:1.55;">${s.buyer} · ${tQty(s).toLocaleString()} pcs · Ship ${s.shipDate}</p>
    <p style="font-size:12px;color:var(--error);margin-bottom:16px;">All production data (prep, sewing, QC, packing logs) will be permanently removed.</p>
    <div class="modal-btns">
      <button class="mbb" onclick="editStyleModal(${si})">Back</button>
      <button class="mbb" style="background:var(--error);color:#fff;border-color:var(--error);" onclick="doDeleteStyle(${si})">Yes, delete</button>
    </div>`);
}

async function doDeleteStyle(si){
  const s=STYLES[si];if(!s)return;
  const code=s.code;
  STYLES.splice(si,1);
  closeModal();
  // Delete from Supabase
  if(s.dbId&&CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    try {
      const url=`${SUPA_URL}/rest/v1/styles?id=eq.${s.dbId}`;
      await fetch(url,{method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`}});
      // Also delete production logs for this style
      const url2=`${SUPA_URL}/rest/v1/production_logs?style_id=eq.${s.dbId}`;
      await fetch(url2,{method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`}});
    } catch(e){ console.error('Delete style error',e); }
  }
  const mc=document.getElementById('mc');
  const sd=SUBS.find(x=>x.id===currentView?.id);
  if(activeTab==='styles'&&sd)renderAllStyles(mc,sd);
  else if(activeTab==='input'&&sd?.type===1)renderT1(mc);
  else if(sd)renderContent();
  showToast(`${code} deleted`);
}

// ── STATUS HANDLERS ──
async function setPSt(si,status){
  const s=STYLES[si];
  s.prepStatus=status;
  if(status==='completed')s.prepDone=tQty(s);
  else if(status==='not-started')s.prepDone=0;
  const next=SUBS[SUBS.findIndex(sd=>sd.id===currentView.id)+1];
  if(status==='completed'&&next)showToast(`${s.code} → ${next.name} available`);
  else showToast(`${s.code} → ${status.replace(/-/g,' ')}`);
  // Save to Supabase
  if(s.dbId&&CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'){
    try {
      const url=`${SUPA_URL}/rest/v1/styles?id=eq.${s.dbId}`;
      await fetch(url,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({prep_status:status,prep_done:s.prepDone})});
    } catch(e){ console.error('PrepStatus save error',e); }
  }
  renderT2(document.getElementById('mc'));
}
function cycleP(si){const c=['not-started','in-progress','completed'];const s=STYLES[si];s.prepStatus=c[(c.indexOf(s.prepStatus)+1)%3];if(s.prepStatus==='completed')s.prepDone=tQty(s);else if(s.prepStatus==='not-started')s.prepDone=0;renderT2(document.getElementById('mc'));}
function valQ(inp,max){const v=parseInt(inp.value)||0;if(v>max){inp.value=max;inp.classList.add('warn');}else inp.classList.remove('warn');}
async function saveQ(sdId,si){
  const sd=SUBS.find(s=>s.id===sdId);const s=STYLES[si];const inp=document.getElementById(`q-${sdId}-${si}`);const val=parseInt(inp?.value)||0;if(val<=0){showToast('Enter qty > 0');return;}
  const depDone=gDepDone(sd,s);const log=s[gLog(sd)]||[];const myT=gTotal(log);const canE=depDone-myT;if(val>canE){showToast(`Max: ${canE} pcs`);return;}
  if(!s[gLog(sd)])s[gLog(sd)]=[];const today=new Date().getDate();const te=s[gLog(sd)].find(e=>e.day===today);if(te)te.qty+=val;else s[gLog(sd)].push({day:today,qty:val});
  const nT=gTotal(s[gLog(sd)]);s[gDone(sd)]=nT;const oQ=tQty(s);if(nT>=oQ){s[sd.statusKey]='completed';}else if(nT>0){s[sd.statusKey]='in-progress';}
  // Save to Supabase
  if(CURRENT_USER.org_id&&CURRENT_USER.org_id!=='demo'&&s.dbId){
    try {
      const existing=await supaFetch('production_logs',{
        filters:[{key:'style_id',value:s.dbId},{key:'sub_dept_id',value:sdId},{key:'day',value:String(today)}]
      });
      if(existing&&existing.length>0){
        const url=`${SUPA_URL}/rest/v1/production_logs?id=eq.${existing[0].id}`;
        await fetch(url,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${CURRENT_USER.access_token||SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({qty:existing[0].qty+val})});
      } else {
        await supaFetch('production_logs',{insert:{org_id:CURRENT_USER.org_id,style_id:s.dbId,sub_dept_id:sdId,day:today,qty:val}});
      }
      
    } catch(e){ console.error('Log save error',e); }
  }
  const next=SUBS[SUBS.findIndex(s2=>s2.id===sdId)+1];showToast(`Saved ${val} ${sd.recordLabel} for ${s.code}${nT>=oQ&&next?` → ${next.name} available`:''}`);if(inp)inp.value='';
  renderT3(document.getElementById('mc'),sd);
}

// ── EDIT / DELETE: DIRECT MESSAGES ──
function editDMModal(id){
  const dm=DMS.find(x=>x.id===id);if(!dm)return;
  showModalHTML(`<h3 style="margin-bottom:4px;">Conversation with ${dm.name}</h3>
    <div style="display:flex;align-items:center;gap:11px;padding:12px;background:var(--bg);border-radius:9px;border:1px solid var(--border);margin-bottom:14px;">
      <div style="width:40px;height:40px;border-radius:50%;background:${dm.bg};color:${dm.tc};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">${dm.av}</div>
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text);">${dm.name}</div>
        <div style="font-size:11px;color:var(--text-3);">${dm.role}</div>
        <div style="display:flex;align-items:center;gap:4px;margin-top:3px;">
          <span style="width:6px;height:6px;border-radius:50%;background:${dm.online?'var(--brand2)':'var(--border)'};display:inline-block;"></span>
          <span style="font-size:11px;color:var(--text-3);">${dm.online?'Active now':'Offline'}</span>
        </div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="mbb" style="color:var(--error);border-color:var(--error);" onclick="deleteDMConfirm('${id}')">Delete conversation</button>
      <button class="mbb prim" onclick="closeModal()">Close</button>
    </div>`);
}

function deleteDMConfirm(id){
  const dm=DMS.find(x=>x.id===id);if(!dm)return;
  showModalHTML(`<h3 style="margin-bottom:8px;">Delete conversation with ${dm.name}?</h3>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:6px;line-height:1.55;">All messages in this conversation will be permanently removed.</p>
    <p style="font-size:12px;color:var(--error);margin-bottom:16px;">This action cannot be undone.</p>
    <div class="modal-btns">
      <button class="mbb" onclick="editDMModal('${id}')">Back</button>
      <button class="mbb" style="background:var(--error);color:#fff;border-color:var(--error);" onclick="doDeleteDM('${id}')">Yes, delete</button>
    </div>`);
}

function doDeleteDM(id){
  const idx=DMS.findIndex(x=>x.id===id);if(idx===-1)return;
  const name=DMS[idx].name;
  DMS.splice(idx,1);delete MSGS[id];
  closeModal();
  if(currentView?.type==='dm'&&currentView.id===id){
    currentView=null;
    document.getElementById('mc').innerHTML=`<div class="welcome"><div class="w-icon">💬</div><div class="w-title">Conversation deleted</div><div class="w-sub">Select another channel from the sidebar.</div></div>`;
    document.getElementById('tb-right').innerHTML='';
  }
  renderSidebar();showToast('Conversation with '+name+' deleted');
}

async function addSubdept(){
  const name=document.getElementById('sd-name')?.value.trim();
  const type=parseInt(document.querySelector('#modal-body select')?.value)||3;
  const record=document.getElementById('sd-record')?.value.trim()||'pcs processed';
  if(!name){showToast('Enter a name');return;}
  const locked=document.getElementById('sd-lock')?.checked||false;
  const opsDept=DEPTS.find(d=>d.subDepts||d.name==='Operations');
  if(!opsDept){showToast('No Operations department found');return;}
  const position=SUBS.length;
  try {
    const result=await supaFetch('sub_departments',{
      insert:{
        department_id:opsDept.id,
        org_id:CURRENT_USER.org_id,
        name,type,
        color:selColor,
        label:type===3?`Daily qty — ${record}`:name,
        record_label:record,
        locked,
        position,
      }
    });
    if(result&&result[0]){
      const s=result[0];
      SUBS.push({id:s.id,name:s.name,type:s.type,color:s.color,label:s.label,recordLabel:s.record_label||record,locked:s.locked,unread:0,position:s.position});
      closeModal();renderSidebar();showToast(`${name} created${locked?' (locked)':''}`);
    } else {
      showToast('Error saving sub-department');
    }
  } catch(e){
    console.error(e);showToast('Error saving sub-department');
  }
}

function createGroup(){
  const name=document.getElementById('gn-name')?.value.trim();const desc=document.getElementById('gn-desc')?.value.trim()||'';const emoji=document.getElementById('gn-emoji')?.value.trim()||'💬';
  if(!name){showToast('Group name required');return;}
  // get selected member checkboxes
  const checked=Array.from(document.querySelectorAll('#member-picks input:checked')).map(c=>c.value);
  const id='g-'+Date.now();
  GROUPS.push({id,name,emoji,color:selColor+'22',tc:selColor,members:['SC',...checked],desc,unread:0});
  if(!MSGS[id])MSGS[id]=[];
  closeModal();renderSidebar();openGroup(id);showToast(`${emoji} #${name} created`);
}

function pickColor(c,el){selColor=c;document.querySelectorAll('.cs').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}

function showModalHTML(html){
  const ov=document.getElementById('overlay');const mb=document.getElementById('modal-body');ov.classList.remove('hidden');mb.innerHTML=html;
}

function closeModal(){document.getElementById('overlay').classList.add('hidden');}
function closeOverlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

// ── INIT ──
renderSidebar();
document.addEventListener('DOMContentLoaded', function(){
  setTimeout(function(){
    loadDepartments().then(function(){
      // Restore last view after departments load
      try {
        const last = localStorage.getItem('lastView');
        if(last){
          const v = JSON.parse(last);
          if(v.type==='subdept') openSub(v.id);
          else if(v.type==='dept') openDept(v.id);
          else if(v.type==='group') openGroup(v.id);
          else if(v.type==='dm') openDM(v.id);
        }
      } catch(e){}
    });
  }, 1500);
});
</script>
</body>
